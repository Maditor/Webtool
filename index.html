<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Webtoon Studio — Cắt & Ghép Ảnh, Đổi Tên, Gắn Logo</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">

  <!-- CARD VÀO/RA DÙNG CHUNG -->
  <div class="card">
    <h2>Cài Đặt Vào / Ra</h2>
    <div class="row">
      <div class="field">
        <label>Đường Dẫn Vào (thư mục chứa ảnh)</label>
        <div class="input-with-btn">
          <input type="text" id="inputPathDisplay" readonly placeholder="Chưa chọn thư mục...">
          <button class="btn-browse" id="btnBrowseInput">Duyệt</button>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Đường Dẫn Ra</label>
        <div class="input-with-btn">
          <input type="text" id="outputPathDisplay" readonly placeholder="Chưa chọn thư mục xuất...">
          <button class="btn-browse" id="btnBrowseOutput">Duyệt</button>
        </div>
        <div class="desc" id="outputModeNote"></div>
      </div>
    </div>
    <input type="file" id="inputFolderFallback" webkitdirectory directory multiple>
  </div>

  <!-- KHUNG NHÓM: nút chuyển chức năng + khung cài đặt tương ứng, chung 1 viền -->
  <div class="module-frame">
    <div class="module-tabs">
      <div class="tool-tab active" data-module="cut"><span class="dot"></span>Cắt & Ghép Ảnh</div>
      <div class="tool-tab" data-module="rename"><span class="dot"></span>Đổi Tên File</div>
      <div class="tool-tab" data-module="logo"><span class="dot"></span>Gắn Logo</div>
    </div>
    <div class="module-body">

  <!-- CARD CẮT ẢNH -->
  <div class="card" id="cutSettingsCard">
    <div class="mode-switch" id="cutModeSwitch">
      <div class="mode-btn active" data-mode="auto">Tự Động</div>
      <div class="mode-btn" data-mode="manual">Cố Định</div>
    </div>
    <div class="row">
      <div class="field">
        <label>Định Dạng File Xuất</label>
        <select id="outputType">
          <option value="image/jpeg" selected>.jpg</option>
          <option value="image/webp">.webp</option>
          <option value="image/png">.png</option>
        </select>
      </div>
      <div class="field">
        <label>Chất Lượng Ảnh (Lossy) <span class="hint">[1-100%]</span></label>
        <input type="number" id="quality" min="1" max="100" value="100">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Chiều Cao Xuất <span id="heightModeHint">(gần đúng, px)</span></label>
        <input type="number" id="roughHeight" min="500" step="100" value="13000">
      </div>
      <div class="field">
        <label>Kiểu Ép Chiều Rộng</label>
        <select id="widthMode">
          <option value="none" selected>Không ép (giữ nguyên, canh trái)</option>
          <option value="scale">Co giãn theo ảnh đầu tiên</option>
          <option value="pad">Đệm nền trắng theo ảnh rộng nhất</option>
        </select>
      </div>
    </div>

    <div class="adv-toggle" id="advToggle"><span class="chev">▸</span> Cài đặt nâng cao (vùng dò điểm cắt an toàn)</div>
    <div class="adv-body" id="advBody">
      <div class="row">
        <div class="field">
          <label>Vùng Dò Ban Đầu Quanh Mốc Cắt (px)</label>
          <input type="number" id="searchWindow" min="30" step="10" value="1000">
        </div>
        <div class="field">
          <label>Ngưỡng Nhạy Màu (0-40)</label>
          <input type="number" id="sensitivity" min="0" max="60" step="1" value="5">
        </div>
      </div>
    </div>
  </div>

  <!-- CARD ĐỔI TÊN -->
  <div class="card" id="renameSettingsCard" style="display:none;">
    <h2>Cài Đặt Đổi Tên</h2>
    <div class="row">
      <div class="field">
        <label>Đánh số thứ tự</label>
        <div style="display:flex; align-items:center; gap:12px;">
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12.5px;">
            <input type="checkbox" id="renameSeqEnabled" checked> Bật
          </label>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:11.5px;color:var(--text-dim);">Số chữ số:</span>
            <input type="number" id="renamePadLength" min="1" max="6" value="3" style="width:70px;">
          </div>
        </div>
        <div class="desc">Ví dụ: 3 → 001, 002, 003...</div>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Phần mở rộng</label>
        <select id="renameExtMode">
          <option value="keep" selected>Giữ nguyên</option>
          <option value="custom">Khác</option>
        </select>
      </div>
      <div class="field" id="renameCustomExtField" style="display:none;">
        <label>Đuôi mới (không dấu chấm)</label>
        <input type="text" id="renameCustomExt" placeholder="vd: webp" value="">
      </div>
    </div>
  </div>

  <!-- CARD GẮN LOGO -->
  <div class="card" id="logoSettingsCard" style="display:none;">
    <h2>Cài Đặt Logo</h2>
    <div class="row">
      <div class="field">
        <label>File Logo</label>
        <div class="input-with-btn">
          <input type="text" id="logoPathDisplay" readonly placeholder="Chưa chọn file logo...">
          <button class="btn-browse" id="btnBrowseLogo">Chọn</button>
        </div>
        <input type="file" id="logoFileInput" accept="image/*">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Chiều cao logo (px)</label>
        <input type="number" id="logoHeight" min="10" step="1" value="50">
      </div>
      <div class="field">
        <label>Độ nét (Opacity) <span class="hint">[0-100%]</span></label>
        <input type="number" id="logoOpacity" min="0" max="100" value="100">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Vị trí ngang</label>
        <select id="logoAlignH">
          <option value="left" selected>Trái</option>
          <option value="center">Giữa</option>
          <option value="right">Phải</option>
        </select>
      </div>
      <div class="field">
        <label>Vị trí dọc</label>
        <select id="logoAlignV">
          <option value="top" selected>Trên</option>
          <option value="center">Giữa</option>
          <option value="bottom">Dưới</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Padding ngang (px)</label>
        <input type="number" id="logoPadX" min="0" step="1" value="10">
      </div>
      <div class="field">
        <label>Padding dọc (px)</label>
        <input type="number" id="logoPadY" min="0" step="1" value="10">
      </div>
    </div>
  </div>

    </div>
  </div>
  <!-- /KHUNG NHÓM -->

  <!-- STATUS -->
  <div class="card">
    <h2>Trạng Thái Hiện Tại</h2>
    <div class="status-row">
      <div class="status-box" id="statusBox">Chờ lệnh…</div>
      <button class="btn-primary" id="btnStart" disabled>Bắt Đầu Xử Lý</button>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
